services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: beyond
      POSTGRES_PASSWORD: password
      POSTGRES_DB: beyond
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: beyond-admin
      MINIO_ROOT_PASSWORD: beyond-password
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
