app = 'beyond-travel-frontend'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[build.args]
  NEXT_PUBLIC_API_BASE_URL="https://beyond-travel-backend.fly.dev"
  NEXT_PUBLIC_SUPABASE_URL="https://zzoxjjkljxbaycmubwog.supabase.co"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
